name: Start Cheap Pod 

on:
  workflow_dispatch:

jobs:
  start-cheap:
    runs-on: ubuntu-latest
    steps:
      - name: Start cheap pod
        run: |
          RESPONSE=$(curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { podResume(input: { podId: \\\"${{ secrets.RUNPOD_CHEAP_POD_ID }}\\\" }) { id desiredStatus } }\"}")

          echo "$RESPONSE"

          if echo "$RESPONSE" | grep -q "not enough free GPUs"; then
            echo "MID pod could not start: no GPU available right now."
            exit 1
          fi

          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "CHEAP pod could not start: RunPod returned an error."
            exit 1
          fi

          echo "CHEAP pod start request succeeded."

      - name: Wait for services
        run: |
          echo "Waiting 90 seconds for Open WebUI/Ollama to boot..."
          sleep 90

      - name: Check cheap pod status
        run: |
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { pod(input: { podId: \\\"${{ secrets.RUNPOD_CHEAP_POD_ID }}\\\" }) { id name desiredStatus runtime { uptimeInSeconds ports { privatePort publicPort type } } } }\"}"
