name: Check Pod Status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Check cheap pod
        run: |
          echo "=== CHEAP POD ==="
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { pod(input: { podId: \\\"${{ secrets.RUNPOD_CHEAP_POD_ID }}\\\" }) { id name desiredStatus runtime { uptimeInSeconds ports { privatePort publicPort type } } } }\"}"

      - name: Check mid pod
        run: |
          echo "=== MID POD ==="
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { pod(input: { podId: \\\"${{ secrets.RUNPOD_MID_POD_ID }}\\\" }) { id name desiredStatus runtime { uptimeInSeconds ports { privatePort publicPort type } } } }\"}"
