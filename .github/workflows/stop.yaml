name: Stop RunPod Pods

on:
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Stop cheap pod
        run: |
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { podStop(input: { podId: \\\"${{ secrets.RUNPOD_CHEAP_POD_ID }}\\\" }) { id desiredStatus } }\"}"

      - name: Stop mid pod
        run: |
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { podStop(input: { podId: \\\"${{ secrets.RUNPOD_MID_POD_ID }}\\\" }) { id desiredStatus } }\"}"

      - name: Stop mid-plus pod
        run: |
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { podStop(input: { podId: \\\"${{ secrets.RUNPOD_MID_PLUS_POD_ID }}\\\" }) { id desiredStatus } }\"}"

      - name: Check status
        run: |
          curl -sS -X POST "https://api.runpod.io/graphql" \
            -H "Authorization: Bearer ${{ secrets.RUNPOD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { myself { pods { id name desiredStatus runtime { uptimeInSeconds } } } }\"}"
